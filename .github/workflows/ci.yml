name: CI

on:
  push:
    branches: [ main ]      
  pull_request:
    branches: [ main ]     

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest   

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true         

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Check formatting
        run: |
          gofmt -l .
          if [ "$(gofmt -l . | wc -l)" -gt 0 ]; then
            echo "These files are not formatted:"
            gofmt -l .
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Show coverage
        run: go tool cover -func=coverage.out
