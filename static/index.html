<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>DSR Симуляция</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis-network/9.1.9/standalone/umd/vis-network.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f1923;color:#cdd6f4;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{background:#1e2a3a;padding:10px 20px;font-size:16px;font-weight:700;color:#89b4fa;border-bottom:1px solid #313244;display:flex;align-items:center;gap:10px}
header span{font-size:12px;color:#6c7086;font-weight:400}
.main{display:flex;flex:1;overflow:hidden}
#graph-container{flex:1;background:#0d1520;position:relative}
.sidebar{width:330px;display:flex;flex-direction:column;background:#1e2a3a;border-left:1px solid #313244;overflow:hidden}
.controls{padding:14px;border-bottom:1px solid #313244}
.controls h3{font-size:13px;color:#89b4fa;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.field-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.field-row label{font-size:12px;color:#6c7086;width:55px;flex-shrink:0}
.field-row input{flex:1;background:#0d1520;border:1px solid #313244;color:#cdd6f4;padding:6px 10px;border-radius:6px;font-size:13px;outline:none}
.field-row input:focus{border-color:#89b4fa}
.btn-row{display:flex;gap:8px;margin-top:6px}
button{padding:7px 14px;border:none;border-radius:6px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.btn-find{background:#89b4fa;color:#1e2a3a}
.btn-find:hover{background:#b4befe}
.btn-reset{background:#313244;color:#cdd6f4}
.btn-reset:hover{background:#45475a}
.btn-step{background:#a6e3a1;color:#1e2a3a}
.btn-step:hover{background:#cba6f7;color:#1e2a3a}
.speed-row{margin-top:12px;display:flex;align-items:center;gap:10px}
.speed-row label{font-size:12px;color:#6c7086;width:55px}
input[type=range]{flex:1;accent-color:#89b4fa}
.speed-val{font-size:12px;color:#cdd6f4;width:45px;text-align:right}
.legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#6c7086}
.leg-dot{width:10px;height:10px;border-radius:50%}
.leg-line{width:18px;height:3px;border-radius:2px}
.log-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
.log-header{padding:10px 14px;font-size:13px;color:#89b4fa;font-weight:700;text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid #313244;display:flex;justify-content:space-between;align-items:center}
.log-header button{font-size:10px;padding:3px 8px;background:#313244;color:#6c7086;border-radius:4px}
.log-body{flex:1;overflow-y:auto;padding:8px}
.log-body::-webkit-scrollbar{width:4px}
.log-body::-webkit-scrollbar-track{background:#0d1520}
.log-body::-webkit-scrollbar-thumb{background:#313244;border-radius:2px}
.entry{font-size:11px;padding:5px 8px;margin-bottom:3px;border-radius:4px;border-left:3px solid;line-height:1.5}
.e-rreq{border-color:#fab387;background:rgba(250,179,135,.07);color:#fab387}
.e-rrep{border-color:#89dceb;background:rgba(137,220,235,.07);color:#89dceb}
.e-found{border-color:#a6e3a1;background:rgba(166,227,161,.1);color:#a6e3a1;font-weight:700}
.e-dup{border-color:#45475a;background:transparent;color:#585b70}
.e-cache{border-color:#cba6f7;background:rgba(203,166,247,.07);color:#cba6f7}
.e-info{border-color:#45475a;background:transparent;color:#6c7086}
.statusbar{padding:5px 14px;background:#0d1520;font-size:11px;color:#45475a;display:flex;justify-content:space-between;border-top:1px solid #313244}
#status-text{color:#6c7086}
.mode-badge{display:inline-block;padding:1px 6px;border-radius:3px;font-size:10px;font-weight:700}
.mode-auto{background:#313244;color:#89b4fa}
.mode-step{background:#313244;color:#a6e3a1}
</style>
</head>
<body>
<header>
  🔀 DSR Protocol Simulation
  <span>Dynamic Source Routing — пошаговая визуализация</span>
</header>
<div class="main">
  <div id="graph-container"></div>
  <div class="sidebar">
    <div class="controls">
      <h3>Управление</h3>
      <div class="field-row">
        <label>Источник</label>
        <input type="number" id="src" value="0" min="0">
      </div>
      <div class="field-row">
        <label>Цель</label>
        <input type="number" id="dst" value="4" min="0">
      </div>
      <div class="btn-row">
        <button class="btn-find" onclick="findRoute()">▶ Найти маршрут</button>
        <button class="btn-step" onclick="stepOnce()" id="btn-step">⏭ Шаг</button>
        <button class="btn-reset" onclick="resetSim()">↺ Сброс</button>
      </div>
      <div class="speed-row">
        <label>Задержка</label>
        <input type="range" id="speed" min="100" max="3000" value="700" step="100"
               oninput="updateSpeed(this.value)">
        <span class="speed-val" id="speed-val">700ms</span>
      </div>
      <div class="btn-row" style="margin-top:8px">
        <button class="btn-reset" onclick="toggleMode()" id="btn-mode">
          Режим: <span class="mode-badge mode-auto">АВТО</span>
        </button>
        <button class="btn-reset" onclick="togglePhysics()" id="btn-phys">Физика: ВКЛ</button>
      </div>
      <div class="legend">
        <div class="leg"><div class="leg-dot" style="background:#fab387"></div>RREQ волна</div>
        <div class="leg"><div class="leg-dot" style="background:#89dceb"></div>RREP ответ</div>
        <div class="leg"><div class="leg-line" style="background:#a6e3a1"></div>Маршрут</div>
        <div class="leg"><div class="leg-dot" style="background:#a6e3a1"></div>Источник</div>
        <div class="leg"><div class="leg-dot" style="background:#f38ba8"></div>Цель</div>
      </div>
    </div>
    <div class="log-panel">
      <div class="log-header">
        📋 Журнал
        <button onclick="clearLog()">Очистить</button>
      </div>
      <div class="log-body" id="log"></div>
    </div>
  </div>
</div>
<div class="statusbar">
  <span id="status-text">Подключение...</span>
  <span id="queue-info">Очередь: 0</span>
</div>

<script>
let visNet = null;
const nodes = new vis.DataSet();
const edges = new vis.DataSet();

let eventQueue = [];
let stepDelay = 700;
let replayTimer = null;
let stepMode = false;
let physicsEnabled = true;
let srcNode = null, dstNode = null;
let ws = null;

// ─── Graph init ───────────────────────────────────────────
function initGraph() {
  const container = document.getElementById('graph-container');
  const opts = {
    nodes: {
      shape: 'circle', size: 24,
      font: { size: 15, color: '#cdd6f4', face: 'Segoe UI' },
      borderWidth: 2,
      color: { background: '#1e2a3a', border: '#45475a',
               highlight: { background: '#313244', border: '#89b4fa' } }
    },
    edges: {
      width: 2, color: { color: '#313244', highlight: '#6c7086' },
      smooth: { type: 'continuous' }
    },
    physics: {
      enabled: true,
      stabilization: { iterations: 300 },
      barnesHut: { gravitationalConstant: -6000, springLength: 130, springConstant: 0.04 }
    },
    interaction: { hover: true, tooltipDelay: 100 }
  };
  visNet = new vis.Network(container, { nodes, edges }, opts);
  visNet.on('stabilizationIterationsDone', () => {
    visNet.setOptions({ physics: { enabled: false } });
    physicsEnabled = false;
    document.getElementById('btn-phys').textContent = 'Физика: ВЫКЛ';
  });
}

// ─── WebSocket ─────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(proto + '//' + location.host + '/ws');

  ws.onopen  = () => setStatus('Подключено ✓');
  ws.onclose = () => { setStatus('Отключено, переподключение...'); setTimeout(connectWS, 2000); };
  ws.onmessage = (e) => {
    const evt = JSON.parse(e.data);
    if (evt.type === 'topology') { renderTopology(evt); return; }
    if (evt.type === 'reset') { resetVisual(); return; }
    eventQueue.push(evt);
    updateQueueInfo();
    if (!stepMode && !replayTimer) scheduleNext();
  };
}

// ─── Topology render ───────────────────────────────────────
function renderTopology(evt) {
  nodes.clear(); edges.clear();
  evt.nodes.forEach(n => nodes.add({ id: n.id, label: String(n.id) }));
  evt.edges.forEach(e => {
    const id = edgeKey(e.from, e.to);
    edges.add({ id, from: e.from, to: e.to });
  });
  setStatus(`Топология: ${evt.nodes.length} узлов, ${evt.edges.length} рёбер`);
}

function edgeKey(u, v) { return Math.min(u,v) + '-' + Math.max(u,v); }

// ─── Event replay ──────────────────────────────────────────
function scheduleNext() {
  if (eventQueue.length === 0) { replayTimer = null; return; }
  const evt = eventQueue.shift();
  processEvent(evt);
  updateQueueInfo();
  replayTimer = setTimeout(scheduleNext, stepDelay);
}

function stepOnce() {
  if (eventQueue.length === 0) return;
  clearTimeout(replayTimer);
  replayTimer = null;
  const evt = eventQueue.shift();
  processEvent(evt);
  updateQueueInfo();
}

function processEvent(evt) {
  const dur = stepDelay * 2.5;
  switch (evt.type) {
    case 'rreq':
      pulseEdge(evt.from, evt.to, '#fab387', dur);
      flashNode(evt.to,   '#7c4a00', dur);
      flashNode(evt.from, '#7c4a00', dur * 0.5);
      addLog(`RREQ [${evt.rreqId}]: ${evt.from}→${evt.to} | путь:[${(evt.routeRecord||[]).join('→')}]`, 'e-rreq');
      setStatus(`RREQ: ${evt.from} → ${evt.to}`);
      break;
    case 'rrep':
      pulseEdge(evt.from, evt.to, '#89dceb', dur);
      flashNode(evt.from, '#004c5a', dur);
      addLog(`RREP: ${evt.from}→${evt.to} | маршрут:[${(evt.route||[]).join('→')}]`, 'e-rrep');
      setStatus(`RREP: ${evt.from} → ${evt.to}`);
      break;
    case 'route_found':
      paintRoute(evt.route, '#a6e3a1');
      addLog(`✓ МАРШРУТ: ${(evt.route||[]).join(' → ')}`, 'e-found');
      setStatus(`Маршрут найден: ${(evt.route||[]).join(' → ')}`);
      break;
    case 'rreq_seen':
      addLog(`⊘ Узел ${evt.node}: дубль RREQ [${evt.rreqId}]`, 'e-dup');
      break;
    case 'cache_hit':
      paintRoute(evt.route, '#cba6f7');
      addLog(`⚡ Узел ${evt.node}: кэш → ${evt.destination}: [${(evt.route||[]).join('→')}]`, 'e-cache');
      setStatus('Маршрут из кэша!');
      break;
    case 'log':
      addLog(evt.message, 'e-info');
      break;
  }
}

// ─── Visual helpers ────────────────────────────────────────
function pulseEdge(u, v, color, dur) {
  const key = edgeKey(u, v);
  if (!edges.get(key)) return;
  edges.update({ id: key, color: { color, highlight: color }, width: 5 });
  setTimeout(() => {
    if (edges.get(key)) edges.update({ id: key, color: { color: '#313244', highlight: '#6c7086' }, width: 2 });
  }, dur);
}

function flashNode(id, bg, dur) {
  if (!nodes.get(id)) return;
  if (id === srcNode || id === dstNode) return;
  nodes.update({ id, color: { background: bg, border: bg } });
  setTimeout(() => {
    if (id !== srcNode && id !== dstNode && nodes.get(id))
      nodes.update({ id, color: { background: '#1e2a3a', border: '#45475a' } });
  }, dur);
}

function paintRoute(route, color) {
  if (!route) return;
  for (let i = 0; i < route.length - 1; i++) {
    const key = edgeKey(route[i], route[i+1]);
    if (edges.get(key)) edges.update({ id: key, color: { color, highlight: color }, width: 5 });
  }
}

function setNodeRole(id, role) {
  const cols = {
    source:      { background: '#1a4731', border: '#a6e3a1' },
    destination: { background: '#4a1a1a', border: '#f38ba8' },
    normal:      { background: '#1e2a3a', border: '#45475a' }
  };
  if (nodes.get(id)) nodes.update({ id, color: cols[role] || cols.normal });
}

function resetVisual() {
  edges.forEach(e => edges.update({ id: e.id, color: { color: '#313244', highlight: '#6c7086' }, width: 2 }));
  nodes.forEach(n => nodes.update({ id: n.id, color: { background: '#1e2a3a', border: '#45475a' } }));
}

// ─── Controls ──────────────────────────────────────────────
function findRoute() {
  const src = parseInt(document.getElementById('src').value);
  const dst = parseInt(document.getElementById('dst').value);
  if (isNaN(src) || isNaN(dst)) { alert('Введите корректные ID узлов'); return; }
  if (src === dst) { alert('Источник и цель должны различаться'); return; }

  srcNode = src; dstNode = dst;
  resetVisual();
  setNodeRole(src, 'source');
  setNodeRole(dst, 'destination');

  eventQueue = [];
  updateQueueInfo();

  fetch('/api/route', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ source: src, destination: dst })
  })
  .then(r => r.json())
  .then(d => { if (d.error) { alert('Ошибка: ' + d.error); } })
  .catch(e => alert('Ошибка запроса: ' + e));
}

function resetSim() {
  clearTimeout(replayTimer);
  replayTimer = null;
  eventQueue = [];
  srcNode = null; dstNode = null;
  resetVisual();
  clearLog();
  updateQueueInfo();
  setStatus('Сброс выполнен');
  fetch('/api/reset', { method: 'POST' });
}

function toggleMode() {
  stepMode = !stepMode;
  const badge = document.querySelector('#btn-mode .mode-badge');
  if (stepMode) {
    badge.textContent = 'ШАГ';
    badge.className = 'mode-badge mode-step';
    clearTimeout(replayTimer);
    replayTimer = null;
  } else {
    badge.textContent = 'АВТО';
    badge.className = 'mode-badge mode-auto';
    if (eventQueue.length > 0) scheduleNext();
  }
}

function togglePhysics() {
  physicsEnabled = !physicsEnabled;
  visNet.setOptions({ physics: { enabled: physicsEnabled } });
  document.getElementById('btn-phys').textContent = 'Физика: ' + (physicsEnabled ? 'ВКЛ' : 'ВЫКЛ');
}

function updateSpeed(val) {
  stepDelay = parseInt(val);
  document.getElementById('speed-val').textContent = val + 'ms';
}

// ─── Log ───────────────────────────────────────────────────
function addLog(text, cls) {
  const log = document.getElementById('log');
  const el = document.createElement('div');
  el.className = 'entry ' + cls;
  el.textContent = text;
  log.appendChild(el);
  log.scrollTop = log.scrollHeight;
}

function clearLog() {
  document.getElementById('log').innerHTML = '';
}

function setStatus(t) { document.getElementById('status-text').textContent = t; }
function updateQueueInfo() { document.getElementById('queue-info').textContent = 'Очередь: ' + eventQueue.length; }

// ─── Boot ─────────────────────────────────────────────────
initGraph();
connectWS();
</script>
</body>
</html>
